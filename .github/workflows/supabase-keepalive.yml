name: Supabase Keep-Alive

# يمنع إيقاف مشروع Supabase المجاني تلقائيًا بعد 7 أيام خمول.
# يعمل query بسيط على قاعدة البيانات كل 3 أيام (هامش آمن قبل حد الـ 7 أيام).
# يمكن أيضًا تشغيله يدويًا من تبويب Actions.

on:
  schedule:
    # كل 3 أيام الساعة 06:00 UTC
    - cron: "0 6 */3 * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST (keep project active)
        env:
          # يستخدم الـ secrets لو مضافة، وإلا يرجع للقيم العامة (المفتاح publishable عام وآمن — موجود أصلًا في الواجهة).
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://detvapbvkabvdjsdttfy.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'sb_publishable_BHyYFJ1yoK7_Ml71goljcw_nNuRFUfi' }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing SUPABASE_URL or SUPABASE_ANON_KEY."
            exit 1
          fi

          echo "Pinging $SUPABASE_URL ..."
          HTTP_CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/subscription_plans?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")

          echo "HTTP status: $HTTP_CODE"
          echo "Response body:"
          cat /tmp/resp.txt
          echo ""

          # 200 = نجاح. 401/403 = المشروع حي لكن صلاحيات؛ كفاية لإبقائه نشطًا.
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
            echo "Supabase project is alive (HTTP $HTTP_CODE). Keep-alive successful."
            exit 0
          fi

          echo "::error::Unexpected status $HTTP_CODE. Project may be paused or unreachable."
          exit 1
