<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#10b981" />
    <title>غير متصل — شات لمة</title>
    <link rel="icon" type="image/svg+xml" href="/lamma-favicon.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&family=Tajawal:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-1: #0a0f0c;
        --bg-2: #0c120d;
        --accent: #10b981;
        --accent-2: #a3e635;
        --glow: rgba(16, 185, 129, 0.25);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        font-family: "Cairo", "Tajawal", system-ui, sans-serif;
        background: radial-gradient(circle at 50% 0%, #0c1810 0%, var(--bg-1) 50%, var(--bg-2) 100%);
        color: #e5e7eb;
        direction: rtl;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        position: relative;
      }

      /* Animated orbs in the background */
      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
        opacity: 0.4;
        pointer-events: none;
      }
      .orb-1 {
        width: 320px; height: 320px;
        background: var(--accent);
        top: -10%; right: -10%;
        animation: float 12s ease-in-out infinite;
      }
      .orb-2 {
        width: 280px; height: 280px;
        background: var(--accent-2);
        bottom: -10%; left: -10%;
        animation: float 14s ease-in-out infinite reverse;
      }

      @keyframes float {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(20px, -20px) scale(1.1); }
      }

      .card {
        position: relative;
        max-width: 440px;
        width: 100%;
        background: rgba(12, 18, 13, 0.85);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        border: 1px solid rgba(16, 185, 129, 0.25);
        border-radius: 32px;
        padding: 2.5rem 1.75rem;
        text-align: center;
        box-shadow:
          0 0 60px var(--glow),
          inset 0 0 30px rgba(16, 185, 129, 0.04);
        animation: rise 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }

      @keyframes rise {
        from { opacity: 0; transform: translateY(20px) scale(0.97); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      .logo-wrap {
        position: relative;
        width: 100px; height: 100px;
        margin: 0 auto 1.25rem;
      }
      .logo-ring {
        position: absolute; inset: 0;
        border-radius: 50%;
        border: 2px solid rgba(16, 185, 129, 0.25);
        animation: pulse-ring 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      .logo-ring.r2 { animation-delay: 0.6s; }
      .logo-ring.r3 { animation-delay: 1.2s; }
      @keyframes pulse-ring {
        0% { transform: scale(0.85); opacity: 0.8; }
        100% { transform: scale(1.4); opacity: 0; }
      }
      .logo {
        position: relative;
        width: 100px; height: 100px;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(16, 185, 129, 0.25), rgba(163, 230, 53, 0.1));
        display: flex; align-items: center; justify-content: center;
        font-size: 44px;
        box-shadow: 0 0 40px var(--glow);
        border: 1px solid rgba(16, 185, 129, 0.3);
      }

      h1 {
        font-size: 1.4rem;
        font-weight: 900;
        margin: 0 0 0.5rem;
        color: #fff;
        letter-spacing: -0.02em;
      }
      .gradient {
        background: linear-gradient(135deg, #10b981, #a3e635);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      p {
        font-size: 0.85rem;
        line-height: 1.7;
        color: #9ca3af;
        margin: 0.25rem 0 1.5rem;
      }

      .tips {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 18px;
        padding: 1rem;
        margin-bottom: 1.5rem;
        text-align: right;
      }
      .tip {
        display: flex; align-items: center; gap: 0.5rem;
        font-size: 0.75rem;
        color: #d1d5db;
        padding: 0.35rem 0;
      }
      .tip-icon {
        width: 24px; height: 24px;
        flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        background: rgba(16, 185, 129, 0.15);
        border-radius: 8px;
        font-size: 14px;
      }

      .actions {
        display: flex; flex-direction: column; gap: 0.5rem;
      }
      .btn {
        display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        padding: 0.85rem 1rem;
        border-radius: 16px;
        font-family: inherit;
        font-size: 0.85rem;
        font-weight: 800;
        cursor: pointer;
        border: none;
        transition: all 0.2s;
        text-decoration: none;
      }
      .btn-primary {
        background: linear-gradient(135deg, #10b981, #059669);
        color: #fff;
        box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
      }
      .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(16, 185, 129, 0.4); }
      .btn-ghost {
        background: rgba(255, 255, 255, 0.05);
        color: #d1d5db;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .btn-ghost:hover { background: rgba(255, 255, 255, 0.1); }

      .status {
        display: inline-flex; align-items: center; gap: 0.4rem;
        font-size: 0.7rem;
        color: #ef4444;
        background: rgba(239, 68, 68, 0.1);
        padding: 0.35rem 0.75rem;
        border-radius: 999px;
        margin-top: 1.25rem;
        font-weight: 700;
      }
      .status-dot {
        width: 6px; height: 6px;
        background: #ef4444;
        border-radius: 50%;
        animation: blink 1.5s infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      @media (max-width: 480px) {
        .card { padding: 2rem 1.25rem; border-radius: 24px; }
        h1 { font-size: 1.2rem; }
      }
    </style>
  </head>
  <body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <main class="card" role="main">
      <div class="logo-wrap" aria-hidden="true">
        <div class="logo-ring r1"></div>
        <div class="logo-ring r2"></div>
        <div class="logo-ring r3"></div>
        <div class="logo">📡</div>
      </div>

      <h1>مش لاقي شبكة <span class="gradient">في اللحظة دي</span></h1>
      <p>نقدر نرجع نتأكد من الاتصال، أو نشوف رجعتك لغرفة المحادثة المفضلة.</p>

      <div class="tips">
        <div class="tip">
          <span class="tip-icon">📶</span>
          <span>تأكد إن الـ Wi-Fi أو بيانات الموبايل شغّالة</span>
        </div>
        <div class="tip">
          <span class="tip-icon">✈️</span>
          <span>لو في وضع الطيران، عطله وجرب تاني</span>
        </div>
        <div class="tip">
          <span class="tip-icon">🔄</span>
          <span>جرب تعمل إعادة تشغيل للراوتر لو الـ Wi-Fi ضعيف</span>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" onclick="window.location.reload()">
          🔄 إعادة المحاولة
        </button>
        <a class="btn btn-ghost" href="/">🏠 الصفحة الرئيسية</a>
      </div>

      <div class="status">
        <span class="status-dot"></span>
        غير متصل بالإنترنت
      </div>
    </main>

    <script>
      // Auto-redirect to the app when the connection is back.
      window.addEventListener("online", () => {
        document.querySelector(".status").innerHTML =
          '<span class="status-dot" style="background:#10b981"></span> رجع الاتصال! بنرجعلك للشات...';
        setTimeout(() => window.location.reload(), 800);
      });
    </script>
  </body>
</html>
